name: E2E and Plugin Check

on:
  pull_request:
    branches:
      - master
      - main
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-e2e:
    name: Functional E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run functional e2e suite
        run: make test-e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-functional
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Runs Plugin Check natively via wp-cli (no browser, no Playwright) —
  # all checks, including the 5 runtime ones. Gating again: the old
  # 5-runtime-checks failure was root-caused (cookie auth cannot survive
  # PCP's pc_-table swap in the wp-admin AJAX flow) and fixed by switching
  # this suite to the CLI runner. See the "Plugin Check runtime checks"
  # gotcha in CLAUDE.md and tests/e2e/check-plugin/run-plugin-check.mjs.
  check-plugin:
    name: Plugin Check (PCP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Plugin Check suite
        run: make check-plugin

      - name: Upload Plugin Check results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-check-results
          path: build/plugin-check-results.txt
          retention-days: 7
