name: E2E and Plugin Check

on:
  pull_request:
    branches:
      - master
      - main
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-e2e:
    name: Functional E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run functional e2e suite
        run: make test-e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-functional
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Plugin Check is known, parked-failing: Task 2 of the e2e/CI plan abandoned
  # Blueprint-driven login for this suite after finding it fundamentally
  # incompatible with 5 of Plugin Check's own 32 runtime checks (a
  # pre-existing @wp-playground/cli/WASM environment limitation, unrelated to
  # this plan). continue-on-error keeps this a visible, non-blocking signal
  # instead of a permanently-red required check, until a human decides how to
  # resolve the underlying issue. See docs/superpowers/plans/2026-07-03-e2e-and-plugin-check-ci.md
  # (Task 2) and the design spec's "What changes" section for full detail.
  check-plugin:
    name: Plugin Check (PCP)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Plugin Check suite
        run: make check-plugin

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-plugin-check
          path: |
            playwright-report/
            test-results/
          retention-days: 7
